{% include 'footer2.html' %}
<style>
    .product-container {
        max-width: 600px;
        padding: 40px;
        background: linear-gradient(to right, #393e46, #222);
        border-radius: 15px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6);
        transition: transform 0.3s ease-in-out;
        overflow: hidden;
        margin-top: 100px;
    }

    .product-container:hover {
        transform: scale(1.02);
    }

    .product-image {
        max-width: 100%;
        height: 350px;
        width: 350px;
        border-radius: 15px;
        margin-bottom: 20px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6);
        object-fit: cover;
    }

    .product-title {
        font-size: 36px;
        font-weight: bold;
        margin-top: 10px;
    }

    .product-description {
        font-size: 18px;
        margin-top: 20px;
        opacity: 0.8;
    }

    .product-price {
        font-size: 24px;
        font-weight: bold;
        color: #4caf50;
        margin-top: 10px;
    }

    .quantity-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 20px;
    }

    .quantity-label {
        font-size: 18px;
        margin-bottom: 10px;
        color: #ccc;
    }

    .quantity-input {
        width: 70px;
        font-size: 16px;
        text-align: center;
        margin-bottom: 20px;
        background-color: #333;
        border: none;
        color: #fff;
        border-radius: 5px;
    }

    .add-to-cart-btn {
        background-color: #4caf50;
        color: #fff;
        padding: 15px 25px;
        font-size: 18px;
        border: none;
        cursor: pointer;
        margin-top: 20px;
        border-radius: 5px;
        transition: background-color 0.3s ease-in-out;
    }

    .add-to-cart-btn:hover {
        background-color: #45a049;
    }
</style>

<div class="product-container container">
    <img src="data:{{ product.image_mimetype }};base64,{{ b64encode(product.image).decode('utf-8') }}" alt="Product Image" class="product-image">
    <h1 class="product-title">{{product.name}}</h1>
    <p class="product-description">{{product.description|safe}}</p>
    <p class="product-price">PLN {{product.price}}</p>
    <form method="POST" novalidate>
      <div class="quantity-container">
        <label class="quantity-label">Ilość:</label>
        <input type="number" name="amount" class="quantity-input" value="1" min="1">
        {% if product.amount >= 1 %}
        <button class="btn btn-success btn-rounded" type="submit" data-mdb-ripple-init>Dodaj do koszyka</button>
        {% else %}
          <button class="btn btn-danger btn-rounded" type="submit" data-mdb-ripple-init disabled>Produkt niedostępny</button>
        {% endif %}
      </div>
    </form>

</div>

{% include 'footer.html' %}
